name: wellbeing_mapper
description: Wellbeing Mapper – a privacy-focused app for mapping your mental wellbeing.

version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=2.14.0 <=4.0.0"

dependencies:
  flutter:
    sdk: flutter
  # Core dependencies (WORKING ✅)
  shared_preferences: ^2.5.2
  sqflite: ^2.4.1
  path_provider: ^2.1.4
  uuid: ^4.5.1
  http: ^1.3.0
  crypto: ^3.0.3
  # Localization (WORKING ✅)
  flutter_localizations:
    sdk: flutter
  
  # JSON and Data Processing (Testing next batch)
  json_annotation: ^4.9.0
  
  # UI and Form Components - Updated versions for compatibility
  flutter_form_builder: ^10.3.0+2
  form_builder_validators: ^11.0.0
  
  # Media and UI Utilities (Testing next batch)
  image_picker: ^1.1.2
  record: ^6.0.0
  audioplayers: ^6.1.0
  url_launcher: ^6.3.1
  mailto: ^2.0.0
  share_plus: ^10.1.2
  flutter_staggered_grid_view: ^0.7.0
  package_info_plus: ^8.0.2
  
  # Notification system for research reminders
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4
  
  # Encryption – proper AES-256-GCM for survey data
  encrypt: ^5.0.3
  
  # Map and Location Dependencies (Testing next batch)
  flutter_map: ^8.1.0
  latlong2: ^0.9.1
  geocoding: ^3.0.0
  flutter_map_cache: ^2.0.0+1
  
  # Chart dependencies for timeline visualization
  fl_chart: ^0.69.2
  intl: ^0.20.2
  

  # Testing permission_handler first ✅ WORKING!
  permission_handler: ^12.0.1
  
  # Testing background_fetch next ✅ WORKING!
  background_fetch: ^1.3.5

  # Background location plugin. Pinned to a specific commit on main so
  # builds are reproducible. Bump the ref after pushing changes to OBL.
  # Replaces flutter_background_geolocation as of the FBG → OBL migration.
  #
  # Active OBL development: put a pubspec_overrides.yaml next to this file
  # with a `path:` entry pointing at a local clone (it is gitignored).
  # See docs/CONTRIBUTOR_SETUP.md.
  open_background_locator:
    git:
      url: https://github.com/ActivitySpaceLab/open-background-locator.git
      ref: 321b056b01f293c72955bb6a4353382b66054a5f
  
  # Additional dependencies from original app
  ffi: ^2.1.3
  fast_rsa: ^3.8.5
  flutter_vector_icons: ^2.0.0
  cached_network_image: ^3.4.1
  flutter_launcher_icons: ^0.14.4

  # Platform-specific path_provider implementations (pinned to avoid build issues)
  path_provider_platform_interface: ^2.0.6
  path_provider_foundation: ^2.1.1  # iOS/macOS
  path_provider_android: ^2.0.24    # Android

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  test: ^1.25.8
  network_image_mock: ^2.1.1
  flutter_driver:
    sdk: flutter
  build_runner: ^2.4.7
  mockito: ^5.4.4
  # Test data generation (dev only)
  faker: ^2.0.0

flutter:
  uses-material-design: true
  
  assets:
    - lang/
    - assets/images/
